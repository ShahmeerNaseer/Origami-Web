<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - OrigamiForAll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="padding-top: 80px;">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-paper-plane me-2"></i>OrigamiForAll
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about-origami.html">About Origami</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
                    <li class="nav-item"><a class="nav-link" href="about-us.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="bg-light-blue py-5 mb-5 text-center">
        <div class="container">
            <h1 class="display-4 fw-bold text-primary-custom">We Value Your Feedback</h1>
            <p class="lead text-muted">Tell us about your experience and how we can improve.</p>
        </div>
    </section>

    <!-- Feedback Form -->
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-5 shadow border-0" style="border-radius: 20px;">
                    <form onsubmit="event.preventDefault(); alert('Thank you for your feedback!');">
                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold text-dark">Your Name</label>
                            <input type="text" class="form-control form-control-lg bg-light" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold text-dark">Email Address</label>
                            <input type="email" class="form-control form-control-lg bg-light" id="email" placeholder="john@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Your Experience</label>
                            <select class="form-select form-select-lg bg-light" required>
                                <option value="" disabled selected>Select an option...</option>
                                <option value="excellent">Excellent - I loved it!</option>
                                <option value="good">Good - Enjoyed the folds</option>
                                <option value="average">Average - Needs more models</option>
                                <option value="poor">Poor - Hard to follow</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="suggestions" class="form-label fw-bold text-dark">Suggestions</label>
                            <textarea class="form-control bg-light" id="suggestions" rows="5" placeholder="Tell us how we can improve our tutorials..." required></textarea>
                        </div>
                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-custom btn-lg px-5">Submit Feedback</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center">
        <div class="container border-top pt-4 pb-2">
            <p class="footer-text small mb-0">&copy; 2026 OrigamiForAll. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
